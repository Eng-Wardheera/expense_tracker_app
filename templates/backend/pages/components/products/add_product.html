{% extends 'backend/home/base.html' %}

{% block title %}Add New Product | Management System{% endblock %}

{% block content %}

<div class="main-content mt-4">

    <form method="POST" enctype="multipart/form-data">

        <div class="card border-top-0">

            <div class="card-header p-0">
                <ul class="nav nav-tabs flex-wrap w-100 text-center customers-nav-tabs">

                    <li class="nav-item flex-fill border-top">
                        <a href="#generalTab"
                           class="nav-link active"
                           data-bs-toggle="tab">
                            General Info
                        </a>
                    </li>

                    <li class="nav-item flex-fill border-top">
                        <a href="#inventoryTab"
                           class="nav-link"
                           data-bs-toggle="tab">
                            Inventory
                        </a>
                    </li>

                    <li class="nav-item flex-fill border-top">
                        <a href="#mediaTab"
                           class="nav-link"
                           data-bs-toggle="tab">
                            Media
                        </a>
                    </li>

                </ul>
            </div>

            <div class="tab-content">

                <!-- GENERAL INFO -->
                <div class="tab-pane fade show active" id="generalTab">

                    <div class="card-body">

                        <div class="row mb-4">
                            <div class="col-lg-4">
                                <label class="fw-bold">
                                    Category:
                                </label>
                            </div>

                            <div class="col-lg-8">
                                <select class="form-select"
                                        name="category_id"
                                        required>

                                    <option value="">
                                        Select Category
                                    </option>

                                    {% for category in categories %}
                                    <option value="{{ category.id }}">
                                        {{ category.name }}
                                    </option>
                                    {% endfor %}

                                </select>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-lg-4">
                                <label class="fw-bold">
                                    Product Name:
                                </label>
                            </div>

                            <div class="col-lg-8">
                                <input type="text"
                                       class="form-control"
                                       name="name"
                                       required>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-lg-4">
                                <label class="fw-bold">
                                    Brand:
                                </label>
                            </div>

                            <div class="col-lg-8">
                                <input type="text"
                                       class="form-control"
                                       name="brand">
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-lg-4">
                                <label class="fw-bold">
                                    Description:
                                </label>
                            </div>

                            <div class="col-lg-8">
                                <textarea class="form-control"
                                          name="description"
                                          rows="5"></textarea>
                            </div>
                        </div>

                    </div>

                </div>

                <!-- INVENTORY -->
                <div class="tab-pane fade" id="inventoryTab">

                    <div class="card-body">

                        <div class="row mb-4">
                            <div class="col-lg-4">
                                <label class="fw-bold">
                                    Price:
                                </label>
                            </div>

                            <div class="col-lg-8">
                                <input type="number"
                                       step="0.01"
                                       class="form-control"
                                       name="price"
                                       value="0">
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-lg-4">
                                <label class="fw-bold">
                                    Stock:
                                </label>
                            </div>

                            <div class="col-lg-8">
                                <input type="number"
                                       class="form-control"
                                       name="stock"
                                       value="0">
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-lg-4">
                                <label class="fw-bold">
                                    SKU:
                                </label>
                            </div>

                            <div class="col-lg-8">
                                <input type="text"
                                       class="form-control"
                                       name="sku">
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-lg-4">
                                <label class="fw-bold">
                                    Status:
                                </label>
                            </div>

                            <div class="col-lg-8">

                                <select class="form-select"
                                        name="status">

                                    <option value="1">
                                        Active
                                    </option>

                                    <option value="0">
                                        Inactive
                                    </option>

                                </select>

                            </div>
                        </div>

                    </div>

                </div>

                <!-- MEDIA -->
                <div class="tab-pane fade" id="mediaTab">

                    <div class="card-body">

                        <div class="row mb-4">

                            <div class="col-lg-4">
                                <label class="fw-bold">
                                    Product Image:
                                </label>
                            </div>

                            <div class="col-lg-8">

                                <input type="file"
                                       class="form-control"
                                       name="image"
                                       id="imageInput"
                                       accept="image/*">

                                <img id="imagePreview"
                                     src="#"
                                     alt="Preview"
                                     style="display:none;max-width:200px;margin-top:10px;"
                                     class="img-thumbnail">

                            </div>

                        </div>

                    </div>

                </div>

            </div>

            <div class="card-footer text-center">

                <button type="submit"
                        class="btn btn-primary">

                    <i class="feather-save me-1"></i>
                    Save Product

                </button>

            </div>

        </div>

    </form>

</div>

<script>

document.getElementById("imageInput").addEventListener("change", function(){

    const file = this.files[0];
    const preview = document.getElementById("imagePreview");

    if(file){

        const reader = new FileReader();

        reader.onload = function(e){

            preview.src = e.target.result;
            preview.style.display = "block";

        };

        reader.readAsDataURL(file);

    }

});

</script>

{% endblock %}
