{% extends 'backend/home/base.html' %}

{% block title %}Edit Product{% endblock %}

{% block content %}

<div class="main-content mt-4">

<form method="POST" enctype="multipart/form-data">

<div class="card border-top-0">

<div class="card-header">
    <h5>Edit Product</h5>
</div>

<div class="card-body">

<div class="row mb-4">

    <div class="col-lg-4">
        <label class="fw-bold">
            Category
        </label>
    </div>

    <div class="col-lg-8">

        <select class="form-select"
                name="category_id"
                required>

            {% for category in categories %}

            <option
                value="{{ category.id }}"
                {% if category.id == product.category_id %}
                selected
                {% endif %}>

                {{ category.name }}

            </option>

            {% endfor %}

        </select>

    </div>

</div>

<div class="row mb-4">

    <div class="col-lg-4">
        <label class="fw-bold">
            Product Name
        </label>
    </div>

    <div class="col-lg-8">

        <input type="text"
               class="form-control"
               name="name"
               value="{{ product.name }}"
               required>

    </div>

</div>

<div class="row mb-4">

    <div class="col-lg-4">
        <label class="fw-bold">
            Brand
        </label>
    </div>

    <div class="col-lg-8">

        <input type="text"
               class="form-control"
               name="brand"
               value="{{ product.brand or '' }}">

    </div>

</div>

<div class="row mb-4">

    <div class="col-lg-4">
        <label class="fw-bold">
            Description
        </label>
    </div>

    <div class="col-lg-8">

        <textarea
            class="form-control"
            rows="4"
            name="description">{{ product.description }}</textarea>

    </div>

</div>

<div class="row mb-4">

    <div class="col-lg-4">
        <label class="fw-bold">
            Price
        </label>
    </div>

    <div class="col-lg-8">

        <input type="number"
               step="0.01"
               class="form-control"
               name="price"
               value="{{ product.price }}">

    </div>

</div>

<div class="row mb-4">

    <div class="col-lg-4">
        <label class="fw-bold">
            Stock
        </label>
    </div>

    <div class="col-lg-8">

        <input type="number"
               class="form-control"
               name="stock"
               value="{{ product.stock }}">

    </div>

</div>

<div class="row mb-4">

    <div class="col-lg-4">
        <label class="fw-bold">
            SKU
        </label>
    </div>

    <div class="col-lg-8">

        <input type="text"
               class="form-control"
               name="sku"
               value="{{ product.sku or '' }}">

    </div>

</div>

<div class="row mb-4">

    <div class="col-lg-4">
        <label class="fw-bold">
            Status
        </label>
    </div>

    <div class="col-lg-8">

        <select class="form-select"
                name="status">

            <option value="1"
                {% if product.status %}
                selected
                {% endif %}>
                Active
            </option>

            <option value="0"
                {% if not product.status %}
                selected
                {% endif %}>
                Inactive
            </option>

        </select>

    </div>

</div>

<div class="row mb-4">

    <div class="col-lg-4">
        <label class="fw-bold">
            Current Image
        </label>
    </div>

    <div class="col-lg-8">

        {% if product.image %}

        <img
            src="{{ url_for('static', filename=product.image) }}"
            class="img-thumbnail mb-3"
            style="max-width:200px;">

        {% endif %}

        <input type="file"
               class="form-control"
               name="image">

    </div>

</div>

</div>

<div class="card-footer text-end">

    <button type="submit"
            class="btn btn-primary">

        <i class="feather-save me-1"></i>
        Update Product

    </button>

</div>

</div>

</form>

</div>

{% endblock %}
